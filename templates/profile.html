{% extends 'base.html' %}

{% block title %}My Profile - Office Attendance System{% endblock %}
{% block header_title %}User Profile & Security{% endblock %}

{% block content %}

<div style="max-width:650px;margin:0 auto;">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title"><i class="ri-user-settings-line"></i> Personal Profile Information</h3>
    </div>

    <form onsubmit="handleProfileUpdate(event)">
      <div style="margin-bottom:1.25rem;">
        <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.4rem;">Full Name</label>
        <input type="text" id="profile-name" class="form-control" style="width:100%" required>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;">
        <div>
          <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.4rem;">Email Address (Read-only)</label>
          <input type="email" id="profile-email" class="form-control" style="width:100%" disabled>
        </div>
        <div>
          <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.4rem;">Employee ID (Read-only)</label>
          <input type="text" id="profile-emp-id" class="form-control" style="width:100%" disabled>
        </div>
      </div>

      <div style="margin-bottom:1.5rem;">
        <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.4rem;">Phone Number</label>
        <input type="text" id="profile-phone" class="form-control" style="width:100%" placeholder="9876543210">
      </div>

      <hr style="border:none;border-top:1px solid var(--border-color);margin:1.5rem 0;">

      <h4 style="font-size:1rem;font-weight:700;margin-bottom:1rem;"><i class="ri-lock-line"></i> Change Password</h4>

      <div style="margin-bottom:1.25rem;">
        <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.4rem;">Current Password</label>
        <input type="password" id="profile-curr-pw" class="form-control" style="width:100%" placeholder="Required if changing password">
      </div>

      <div style="margin-bottom:1.5rem;">
        <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.4rem;">New Password</label>
        <input type="password" id="profile-new-pw" class="form-control" style="width:100%" placeholder="Enter new password">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%">
        <i class="ri-save-line"></i> Save Profile Settings
      </button>
    </form>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (AppState.user) {
        document.getElementById('profile-name').value = AppState.user.name || '';
        document.getElementById('profile-email').value = AppState.user.email || '';
        document.getElementById('profile-emp-id').value = AppState.user.employee_id || '';
        document.getElementById('profile-phone').value = AppState.user.phone || '';
      }
    }, 400);
  });

  async function handleProfileUpdate(e) {
    e.preventDefault();
    const name = document.getElementById('profile-name').value;
    const phone = document.getElementById('profile-phone').value;
    const current_password = document.getElementById('profile-curr-pw').value;
    const new_password = document.getElementById('profile-new-pw').value;

    try {
      const res = await apiFetch('/api/employee/profile/update', {
        method: 'POST',
        body: JSON.stringify({ name, phone, current_password, new_password })
      });
      showToast(res.message, 'success');
      document.getElementById('profile-curr-pw').value = '';
      document.getElementById('profile-new-pw').value = '';
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }
</script>

{% endblock %}
